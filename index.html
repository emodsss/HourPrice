<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Convertisseur Temps de Vie</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #f4f7f6; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .resultat { margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 10px; font-weight: bold; text-align: center; color: #2e7d32; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Vaut-il ton temps ?</h2>
    <label>Ton salaire net mensuel (€)</label>
    <input type="number" id="salaire" placeholder="ex: 2000" oninput="calculer()">
    
    <label>Heures travaillées par mois</label>
    <input type="number" id="heures" value="151.67" oninput="calculer()">
    
    <label>Prix de l'objet (€)</label>
    <input type="number" id="prix" placeholder="ex: 150" oninput="calculer()">

    <div id="resultat" class="resultat"></div>
</div>

<script>
    function calculer() {
        const salaire = document.getElementById('salaire').value;
        const heures = document.getElementById('heures').value;
        const prix = document.getElementById('prix').value;
        const divResultat = document.getElementById('resultat');

        if (salaire > 0 && heures > 0 && prix > 0) {
            const tauxHoraire = salaire / heures;
            const tempsNecessaire = prix / tauxHoraire;
            
            divResultat.style.display = "block";
            divResultat.innerHTML = `Cet objet te coûte <br> ${tempsNecessaire.toFixed(1)} heures de ta vie.`;
        } else {
            divResultat.style.display = "none";
        }
    }
</script>

</body>
</html>
